{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-800">Cargar Nueva Donación</h2>
        <p class="text-slate-500 text-sm">Registra un nuevo ingreso de dinero al sistema.</p>
    </div>

    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium mb-1">Seleccionar Donante</label>
            {{ form.donante }}
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Monto ($)</label>
                {{ form.monto }}
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Fecha de Pago</label>
                {{ form.fecha_pago }}
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Método</label>
                {{ form.metodo }}
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Comprobante / Ref.</label>
                {{ form.comprobante }}
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Notas adicionales</label>
            {{ form.notas }}
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-50">
            <a href="{% url 'lista_donantes' %}" class="px-6 py-2 text-slate-500 hover:text-slate-700 transition-colors">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow-lg shadow-purple-100 transition-all font-medium">
                Guardar Donación
            </button>
        </div>
    </form>
</div>
{% endblock %}
