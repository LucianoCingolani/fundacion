{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
            <i data-lucide="send"></i> Comunicación Masiva
        </h2>
        <p class="text-slate-500 text-sm">Envía un mensaje a un segmento específico de donantes.</p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium mb-1">Enviar a:</label>
            <select name="tipo_donante" class="w-full p-2 border border-slate-300 rounded-lg bg-white">
                <option value="Recurrente">Donantes Recurrentes</option>
                <option value="Eventual">Donantes Eventuales</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Asunto</label>
            <input type="text" name="asunto" required placeholder="Ej: Gracias por tu apoyo mensual" 
                   class="w-full p-2 border border-slate-300 rounded-lg">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Mensaje</label>
            <textarea name="mensaje" rows="6" required placeholder="Escribe aquí el contenido del correo..." 
                      class="w-full p-2 border border-slate-300 rounded-lg"></textarea>
        </div>

        <div class="pt-4">
            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition-all shadow-lg shadow-blue-100">
                Enviar Correos Ahora
            </button>
        </div>
    </form>
</div>
{% endblock %}
