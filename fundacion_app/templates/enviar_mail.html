{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Enviar Comunicación</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1">Grupo de Destino</label>
            <select name="tipo_donante" class="w-full p-2 border rounded-lg bg-white">
                <option value="Recurrente">Donantes Recurrentes</option>
                <option value="Eventual">Donantes Eventuales</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Asunto</label>
            <input type="text" name="asunto" required class="w-full p-2 border rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Mensaje</label>
            <textarea name="mensaje" rows="5" required class="w-full p-2 border rounded-lg"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800">
            Enviar a los Donantes
        </button>
    </form>
</div>
{% endblock %}
