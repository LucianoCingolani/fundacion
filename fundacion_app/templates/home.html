{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Panel de Gestión de Donaciones</h1>
    
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3">
                <small class="text-muted">Total Donantes</small>
                <h3 class="fw-bold">{{ total_donantes }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3 border-start border-primary border-4">
                <small class="text-muted">Recaudación Marzo</small>
                <h3 class="fw-bold text-primary">$ {{ recaudacion_mes }}</h3>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Últimas Donaciones</h5>
        </div>
    </div>
</div>
{% endblock %}
